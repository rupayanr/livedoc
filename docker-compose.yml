# LiveDoc Docker Compose Configuration
# For local development only - DO NOT use default credentials in production

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend
    networks:
      - livedoc-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-livedoc}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - CORS_ORIGINS=["http://localhost:5173"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: ["./start.sh", "--reload"]
    networks:
      - livedoc-network

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-livedoc}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # NOTE: Port exposed only for local development debugging
    # Comment out for production or use 127.0.0.1:5432:5432
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - livedoc-network

  redis:
    image: redis:7-alpine
    # NOTE: Port exposed only for local development debugging
    # Comment out for production or use 127.0.0.1:6379:6379
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    # Enable password authentication
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    networks:
      - livedoc-network

networks:
  livedoc-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
