# Render Blueprint - LiveDoc Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: livedoc-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: livedoc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: livedoc-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: "false"

databases:
  - name: livedoc-db
    databaseName: livedoc
    plan: free
    region: oregon

  - name: livedoc-redis
    type: redis
    plan: free
    region: oregon
